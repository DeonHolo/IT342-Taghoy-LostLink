spring.application.name=lostlink

# ── MySQL Database (Home – MySQL Workbench) ──
spring.datasource.url=jdbc:mysql://localhost:3306/lostlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Google Sign-In (Web client ID — public; override with GOOGLE_OAUTH_CLIENT_ID if needed) ──
lostlink.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:1028838216114-4d357oh30ogos36mrt2e8aom130gkmkm.apps.googleusercontent.com}

# ── Server ──
server.port=8080

# ── File Upload (5MB max per SDD) ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── SMTP Mail — Gmail (default). Secrets: see application-local.properties.example ──
# Permanent setup: copy backend/src/main/resources/application-local.properties.example
# to application-local.properties (same folder), fill in Gmail + app password. That file is gitignored.
# Env vars MAIL_* still override if set (e.g. in production).
# 1) Google Account → Security → 2-Step Verification ON
# 2) Security → App passwords → Mail → copy 16-char password
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
lostlink.mail.from=${MAIL_FROM:}
lostlink.mail.enabled=${MAIL_ENABLED:false}

# Optional local overrides (gitignored). Values here win over the lines above.
spring.config.import=optional:classpath:application-local.properties
